name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches system.json version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.1.1
          MANIFEST_VERSION="v$(jq -r .version system.json)"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match system.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build zip
        run: |
          zip -r 4-stat-dg.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.zip" \
            -x ".DS_Store" \
            -x ".gitignore" \
            -x "RELEASE.md"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            system.json
            4-stat-dg.zip
          generate_release_notes: true
